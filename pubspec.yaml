name: openstrap_edge
description: "OpenStrap — open-source WHOOP 4.0 companion. BLE drain → raw-first local store → cloud sync."
publish_to: 'none'
version: 0.2.0+3

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # BLE — flutter_blue_plus is the maintained cross-platform GATT client.
  flutter_blue_plus: ^1.35.5

  # Local raw-first storage.
  sqflite: ^2.4.1
  path: ^1.9.0
  path_provider: ^2.1.5

  # Cloud upload.
  http: ^1.2.2

  # State + small settings persistence.
  provider: ^6.1.2
  shared_preferences: ^2.3.3

  # Charts (for the future server-analytics view).
  fl_chart: ^0.69.2

  # Modern type (Space Grotesk display + Inter body) and a professional icon set.
  google_fonts: ^6.2.1
  hugeicons: ^0.0.11

  # Share recap cards (rendered card → image → share sheet).
  share_plus: ^10.1.4

  # Background sync — OS-scheduled periodic task (Android WorkManager / iOS BGTask).
  # No foreground service, no persistent notification.
  workmanager: ^0.9.0

  # Home/lock-screen widget bridge (writes a snapshot to the App Group → WidgetKit).
  home_widget: ^0.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.25.8
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#F4F1EC"
  adaptive_icon_foreground: "assets/images/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
